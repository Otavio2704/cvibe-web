<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>CVibe — Redirecionando...</title>
    <!--
      GitHub Pages serve arquivos estáticos e não conhece as rotas internas do
      React Router (ex: /dashboard, /generate). Quando alguém acessa uma dessas
      rotas diretamente ou dá refresh nelas, o GitHub Pages devolve 404 porque
      esse "arquivo" não existe fisicamente no servidor.

      Esse script resolve isso: transforma a URL solicitada em uma query string
      e redireciona para o index.html, que por sua vez (via script no
      index.html) decodifica a query string de volta na URL real antes do
      React Router assumir o controle. Técnica padrão para SPAs em GitHub
      Pages (baseada em https://github.com/rafgraph/spa-github-pages).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // mantém o "/cvibe-web" do base path

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
