        connect-src 'self' http://localhost:8080 https://gupify-api.onrender.com;
        img-src 'self' data:;
        font-src 'self' data: https://fonts.gstatic.com;
      "
    />

  <body>
    <!--
      Parte 2 do fallback de SPA para GitHub Pages (ver public/404.html).
      Decodifica a URL real a partir da query string criada pelo 404.html
      e reescreve a URL do navegador ANTES do React Router montar, para que
      o deep-link (ex: /dashboard) seja restaurado corretamente.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <div id="root"></div>
  </body>
