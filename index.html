<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Ícone da aba do navegador -->
    <link rel="icon" type="image/png" href="./gupify-logo.png" />
    <link rel="apple-touch-icon" href="./gupify-logo.png" />

    <!-- Metadados básicos -->
    <meta name="description" content="Envie seu currículo e a vaga desejada. A IA do Gupify ajusta seu resumo para aumentar a aderência ao algoritmo de recrutamento da Gupy." />

    <!-- Open Graph (WhatsApp, LinkedIn, Discord, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gupify" />
    <meta property="og:title" content="Gupify — Otimizador de Currículo para a Gupy" />
    <meta property="og:description" content="Envie seu currículo e a vaga desejada. A IA do Gupify ajusta seu resumo para aumentar a aderência ao algoritmo de recrutamento da Gupy." />
    <meta property="og:image" content="https://otavio2704.github.io/gupify-web/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://otavio2704.github.io/gupify-web/" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gupify — Otimizador de Currículo para a Gupy" />
    <meta name="twitter:description" content="Envie seu currículo e a vaga desejada. A IA do Gupify ajusta seu resumo para aumentar a aderência ao algoritmo de recrutamento da Gupy." />
    <meta name="twitter:image" content="https://otavio2704.github.io/gupify-web/og-image.jpg" />

    <!-- 🔒 CSP do front -->
    <!-- unsafe-inline é necessário porque o vite-plugin-singlefile injeta assets inline -->
    <!-- frame-ancestors não funciona via meta tag; se precisar, configure no servidor HTTP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        connect-src 'self' http://localhost:8080 https://gupify-api.onrender.com https://api.emailjs.com;
        img-src 'self' data:;
        font-src 'self' data: https://fonts.gstatic.com;
      "
    />

    <title>Gupify — Otimizador de Perfil e Currículo para a Gupy</title>
  </head>
  <body>
    <!--
      Parte 2 do fallback de SPA para GitHub Pages (ver public/404.html).
      Decodifica a URL real a partir da query string criada pelo 404.html
      e reescreve a URL do navegador ANTES do React Router montar, para que
      o deep-link (ex: /dashboard) seja restaurado corretamente.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
