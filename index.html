<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Ícone da aba do navegador -->
    <!-- Path absoluto fixo com o base do GitHub Pages (/cvibe-web/).
         Testamos "./cvibe-logo.png" (relativo) e "%BASE_URL%cvibe-logo.png"
         (variável do Vite) e nenhum dos dois funciona aqui: o
         vite-plugin-singlefile processa o HTML antes da substituição de
         %BASE_URL% e não reescreve corretamente caminhos relativos em tags
         <link> fora do fluxo padrão de assets. Resultado: em produção
         resolvia para a raiz do domínio (otavio2704.github.io/cvibe-logo.png)
         em vez da subpasta correta
         (otavio2704.github.io/cvibe-web/cvibe-logo.png), gerando 404.
         Path absoluto fixo é o único que funcionou de forma confiável.
         Efeito colateral aceitável: em dev local (localhost:5173) o favicon
         dá 404, já que não existe "/cvibe-web/" na raiz local — é só
         cosmético (ícone da aba), sem impacto funcional. -->
    <link rel="icon" type="image/png" href="/cvibe-web/cvibe-logo.png" />
    <link rel="apple-touch-icon" href="/cvibe-web/cvibe-logo.png" />

    <!-- Metadados básicos -->
    <meta name="description" content="Envie seu currículo e a vaga desejada. A IA do CVibe ajusta seu resumo para aumentar a aderência aos algoritmos de triagem dos processos seletivos." />

    <!-- Open Graph (WhatsApp, LinkedIn, Discord, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CVibe" />
    <meta property="og:title" content="CVibe — Otimizador de Currículo para Processos Seletivos" />
    <meta property="og:description" content="Envie seu currículo e a vaga desejada. A IA do CVibe ajusta seu resumo para aumentar a aderência aos algoritmos de triagem dos processos seletivos." />
    <meta property="og:image" content="https://otavio2704.github.io/cvibe-web/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://otavio2704.github.io/cvibe-web/" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CVibe — Otimizador de Currículo para Processos Seletivos" />
    <meta name="twitter:description" content="Envie seu currículo e a vaga desejada. A IA do CVibe ajusta seu resumo para aumentar a aderência aos algoritmos de triagem dos processos seletivos." />
    <meta name="twitter:image" content="https://otavio2704.github.io/cvibe-web/og-image.jpg" />

    <!-- 🔒 CSP do front -->
    <!-- unsafe-inline é necessário porque o vite-plugin-singlefile injeta assets inline -->
    <!-- frame-ancestors não funciona via meta tag (só via header HTTP), por isso o -->
    <!-- GitHub Pages não consegue bloquear iframes só com a CSP abaixo. O script -->
    <!-- de frame-busting logo no início do <head> cobre esse caso. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        connect-src 'self' http://localhost:8080 https://gupify-api.onrender.com https://api.emailjs.com;
        img-src 'self' data:;
        font-src 'self' data: https://fonts.gstatic.com;
        frame-ancestors 'self';
      "
    />

    <!-- 🔒 Anti-clickjacking: quebra o iframe caso o site seja embutido em outra origem. -->
    <!-- Roda o mais cedo possível, antes de qualquer outro recurso carregar. -->
    <script type="text/javascript">
      if (window.top !== window.self) {
        window.top.location = window.self.location;
      }
    </script>

    <title>CVibe — Otimizador de Perfil e Currículo para Processos Seletivos</title>
  </head>
  <body>
    <!--
      Parte 2 do fallback de SPA para GitHub Pages (ver public/404.html).
      Decodifica a URL real a partir da query string criada pelo 404.html
      e reescreve a URL do navegador ANTES do React Router montar, para que
      o deep-link (ex: /dashboard) seja restaurado corretamente.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
